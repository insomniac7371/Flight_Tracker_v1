<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Family Arrival Coordinator</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Airport Pickup</p>
        <h1>Family Arrival</h1>
      </div>
      <button class="icon-button" id="installButton" type="button" title="Install app" aria-label="Install app">+</button>
    </header>

    <section class="status-hero" aria-label="Current trip status">
      <div>
        <p id="heroFlight">No flight set</p>
        <h2 id="heroTraveler">Create a pickup board</h2>
        <span id="heroMeta">Local-only planner</span>
      </div>
      <strong id="heroStatus">Planned</strong>
    </section>

    <nav class="tabs" aria-label="App sections">
      <button class="tab active" data-tab="plan" type="button">Plan</button>
      <button class="tab" data-tab="board" type="button">Board</button>
      <button class="tab" data-tab="kit" type="button">Kit</button>
    </nav>

    <section class="tab-panel active" id="planPanel">
      <form id="tripForm" class="form-grid">
        <label>
          <span>Traveler</span>
          <input id="travelerName" autocomplete="name" placeholder="Dad">
        </label>
        <label>
          <span>Flight</span>
          <input id="flightNumber" inputmode="text" placeholder="AA1234">
        </label>
        <label>
          <span>Airline</span>
          <input id="airline" placeholder="American">
        </label>
        <label>
          <span>Arrival airport</span>
          <input id="arrivalAirport" placeholder="PHL Terminal B">
        </label>
        <label>
          <span>Arrival time</span>
          <input id="arrivalTime" type="datetime-local">
        </label>
        <label>
          <span>Pickup person</span>
          <input id="pickupPerson" placeholder="Me">
        </label>
        <label class="wide">
          <span>Pickup address or door</span>
          <input id="pickupAddress" placeholder="Arrivals curb, Door 3">
        </label>
        <label class="wide">
          <span>Trip notes</span>
          <textarea id="notes" rows="3" placeholder="Wheelchair assistance, meds bag, baggage claim plan"></textarea>
        </label>
        <button class="primary-action wide" type="submit">Save Trip</button>
      </form>
    </section>

    <section class="tab-panel" id="boardPanel">
      <div class="section-title">
        <h2>Status</h2>
        <button class="secondary-action" id="shareStatusButton" type="button">Share Text</button>
      </div>
      <div class="status-grid" id="statusGrid"></div>

      <div class="section-title">
        <h2>Pickup Tools</h2>
      </div>
      <div class="tool-grid">
        <button class="tool-button" id="mapButton" type="button">
          <span>Map</span>
          <strong>Open pickup route</strong>
        </button>
        <button class="tool-button" id="gpsButton" type="button">
          <span>GPS</span>
          <strong>Save current spot</strong>
        </button>
        <button class="tool-button" id="notifyButton" type="button">
          <span>Alert</span>
          <strong>Test reminder</strong>
        </button>
      </div>
      <p class="quiet" id="locationReadout">No location saved yet.</p>
    </section>

    <section class="tab-panel" id="kitPanel">
      <div class="section-title">
        <h2>Checklist</h2>
        <button class="secondary-action" id="resetChecklistButton" type="button">Reset</button>
      </div>
      <div class="checklist" id="checklist"></div>

      <div class="section-title">
        <h2>Photos</h2>
        <label class="camera-action">
          Add Photo
          <input id="photoInput" type="file" accept="image/*" capture="environment">
        </label>
      </div>
      <div class="photo-grid" id="photoGrid">
        <p class="quiet">Ticket, baggage, meds, parking, or pickup landmark photos stay on this device.</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
